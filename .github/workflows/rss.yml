name: Generate RSS Feed

on:
  push:
    branches:
      - main
    paths:
      - 'data/a-share/**'

jobs:
  rss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate RSS
        run: |
          cat > rss.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0" xmlns:atom="http://www.w3.org/2005/Atom">
          <channel>
            <title>A股点评</title>
            <link>https://magicwen007.github.io/a-share-viewer/</link>
            <description>A股每日收盘点评</description>
            <language>zh-cn</language>
            <lastBuildDate>$(date -R)</lastBuildDate>
            <atom:link href="https://magicwen007.github.io/a-share-viewer/rss.xml" rel="self" type="application/rss+xml"/>
          EOF

          # 读取 manifest.json 获取日期列表
          if [ -f data/a-share/manifest.json ]; then
            cat data/a-share/manifest.json | python3 -c "
          import json, sys, datetime
          data = json.load(sys.stdin)
          for item in data.get('dates', []):
            date = item['date']
            times = item.get('times', [])
            title = f'{date} 点评'
            if '1500' in times:
              title = f'{date} 收盘点评'
            elif '1200' in times:
              title = f'{date} 午盘点评'
            elif '1000' in times:
              title = f'{date} 早盘点评'
            pub_date = datetime.datetime.strptime(date, '%Y-%m-%d').strftime('%a, %d %b %Y 15:00:00 +0800')
            print(f'''<item>
              <title><![CDATA[{title}]]></title>
              <link>https://magicwen007.github.io/a-share-viewer/#{date}</link>
              <guid>https://magicwen007.github.io/a-share-viewer/#{date}</guid>
              <pubDate>{pub_date}</pubDate>
            </item>''')
          " >> rss.xml
          fi

          echo '</channel>' >> rss.xml
          echo '</rss>' >> rss.xml

      - name: Commit RSS
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add rss.xml
          git diff --staged --quiet || git commit -m "Update RSS feed" || true
          git push
